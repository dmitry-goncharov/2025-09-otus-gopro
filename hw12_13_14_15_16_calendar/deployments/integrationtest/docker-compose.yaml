name: calendar

services:

  db:
    image: postgres:17.0
    container_name: db
    restart: on-failure
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql    

  mq:
    image: rabbitmq:4.2.4
    container_name: mq
    restart: on-failure
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 20s
      retries: 5
    stop_grace_period: 20s

  app:
    image: calendar-app:1.0.0
    container_name: app
    ports:
      - "8080:8080"
      - "8090:8090"
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    command: sh -c '/opt/calendar/calendar-app --config /etc/calendar/config.yaml'

  scheduler:
    image: calendar-scheduler:1.0.0
    container_name: scheduler
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      mq:
        condition: service_healthy
    command: sh -c '/opt/calendar/calendar-scheduler --config /etc/calendar/scheduler_config.yaml'

  sender:
    image: calendar-sender:1.0.0
    container_name: sender
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      mq:
        condition: service_healthy
    command: sh -c '/opt/calendar/calendar-sender --config /etc/calendar/sender_config.yaml'

  integrationtest:
    image: calendar-base:1.0.0
    container_name: integrationtest
    depends_on:
      - app
      - scheduler
      - sender
    command: go test -v -tags=integration ./tests/integration/...
